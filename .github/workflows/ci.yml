name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc --noEmit

      - name: Format check
        run: yarn prettier --check ./src

      - name: Lint
        run: yarn lint
